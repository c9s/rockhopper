name: Go

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        go-version:
        - "1.25"
    env:
      GITHUB_CI: true
      MYSQL_DATABASE: bbgo
      MYSQL_USER: "root"
      MYSQL_PASSWORD: "root" # pragma: allowlist secret

      # DSN for mysql integration tests. The cloud CI runner cannot reach the
      # Docker API, so the integration test connects to the MySQL service
      # container below instead of starting its own container.
      TEST_MYSQL_DSN: "root:root@tcp(127.0.0.1:3306)/integration_test?parseTime=true"

    # Run MySQL as a service container. GitHub Actions starts it before the job
    # and waits until it is healthy; the test connects to it over the mapped
    # port via TEST_MYSQL_DSN.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: "root" # pragma: allowlist secret
          MYSQL_DATABASE: bbgo
        ports:
        - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:

    - uses: actions/checkout@v6
      with:
        # lfs: 'true'
        ssh-key: ${{ secrets.git_ssh_key }}

    - uses: actions/cache@v5
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Set up MySQL
      # The service container already created the bbgo database (MYSQL_DATABASE).
      # Create the separate database used by the integration test.
      run: |
        mysql -h 127.0.0.1 -P 3306 -u${{ env.MYSQL_USER }} -p${{ env.MYSQL_PASSWORD }} \
          -e 'CREATE DATABASE IF NOT EXISTS integration_test;'

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Test Migration SQL Files For MySQL
      run: |
        go run ./cmd/rockhopper --config rockhopper_mysql.yaml up --debug

    - name: Test Migration SQL Files For SQLite
      run: |
        go run ./cmd/rockhopper --config rockhopper_sqlite.yaml up --debug

    - name: Compile Migration
      run: |
        go run ./cmd/rockhopper --config rockhopper_mysql.yaml compile --output pkg/testing/migrations
        go test ./pkg/testing/migrations

    - name: Build
      run: go build -v ./cmd/rockhopper

    - name: Test
      run: |
        go test -race -coverprofile coverage.txt -covermode atomic ./...
        sed -i -e '/_requestgen.go/d' coverage.txt

    - name: Revive Check
      uses: morphy2k/revive-action@v2.7.7 # https://github.com/mgechev/revive/issues/956
      with:
        reporter: github-pr-review
        fail_on_error: true

    - name: Upload Coverage Report
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.txt,./coverage_dnum.txt

    - name: Create dotenv file
      run: |
        echo "DB_DRIVER=mysql" >> .env.local
        echo "DB_DSN=root:root@/bbgo" >> .env.local

