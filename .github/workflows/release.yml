name: Create Release

on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - "v*" # Push events to matching v*, i.e. v1.0, v20.15.10

permissions:
  contents: write # needed to create the GitHub release and upload assets

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build natively on each platform so CGO (mattn/go-sqlite3) works
          # without needing a cross-compilation toolchain.
          - { runner: ubuntu-latest,    goos: linux,  goarch: amd64 }
          - { runner: ubuntu-24.04-arm, goos: linux,  goarch: arm64 }
          - { runner: macos-13,         goos: darwin, goarch: amd64 }
          - { runner: macos-latest,     goos: darwin, goarch: arm64 }
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          NAME="rockhopper-${VERSION}-${GOOS}-${GOARCH}"
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.Commit=${GITHUB_SHA} -X main.BuildTime=${BUILD_TIME}"
          go build -ldflags "${LDFLAGS}" -o rockhopper ./cmd/rockhopper
          tar -czf "${NAME}.tar.gz" rockhopper
          shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rockhopper-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            *.tar.gz
            *.tar.gz.sha256
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          generate_release_notes: true
          draft: false
          prerelease: false
